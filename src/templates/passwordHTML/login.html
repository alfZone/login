<!doctype html>
<html lang="pt">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Coleciona+ - Login</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet" />

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" />

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" />

    <style>
      :root {
        --primary-dark: #0a1929;
        --primary-medium: #1e3a5f;
        --primary-light: #2b4c7c;
        --accent: #3d6b9c;
        --text-light: #e3f2fd;
      }

      body {
        background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary-medium) 100%);
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0;
        padding: 20px;
      }

      .login-container {
        max-width: 450px;
        width: 100%;
      }

      .login-card {
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(10px);
        border-radius: 20px;
        padding: 40px;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        border: 1px solid rgba(255, 255, 255, 0.2);
        animation: slideUp 0.5s ease-out;
      }

      @keyframes slideUp {
        from {
          opacity: 0;
          transform: translateY(30px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .login-header {
        text-align: center;
        margin-bottom: 30px;
      }

      .login-header h2 {
        color: var(--primary-dark);
        font-weight: 600;
        margin-bottom: 10px;
      }

      .login-header h2 i {
        color: var(--primary-medium);
        margin-right: 10px;
      }

      .login-header p {
        color: #6c757d;
        font-size: 0.9rem;
      }

      .form-floating {
        margin-bottom: 20px;
      }

      .form-floating input {
        border: 2px solid #e9ecef;
        border-radius: 12px;
        padding: 1rem 0.75rem;
        height: auto;
        transition: all 0.3s;
      }

      .form-floating input:focus {
        border-color: var(--primary-medium);
        box-shadow: 0 0 0 0.2rem rgba(30, 58, 95, 0.25);
      }

      .form-floating label {
        color: #6c757d;
        padding: 1rem 0.75rem;
      }

      .btn-login {
        background: linear-gradient(135deg, var(--primary-dark), var(--primary-medium));
        color: white;
        border: none;
        border-radius: 12px;
        padding: 14px;
        font-weight: 600;
        font-size: 1.1rem;
        width: 100%;
        margin-bottom: 20px;
        transition: all 0.3s;
        cursor: pointer;
      }

      .btn-login:hover {
        transform: translateY(-2px);
        box-shadow: 0 5px 20px rgba(30, 58, 95, 0.4);
        background: linear-gradient(135deg, var(--primary-medium), var(--primary-dark));
      }

      .btn-google {
        background: white;
        color: #444;
        border: 2px solid #e9ecef;
        border-radius: 12px;
        padding: 12px;
        font-weight: 500;
        width: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        transition: all 0.3s;
        cursor: pointer;
        text-decoration: none;
      }

      .btn-google:hover {
        background: #f8f9fa;
        border-color: var(--primary-light);
        transform: translateY(-2px);
      }

      .btn-google img {
        width: 20px;
        height: 20px;
      }

      .divider {
        display: flex;
        align-items: center;
        text-align: center;
        margin: 20px 0;
        color: #adb5bd;
      }

      .divider::before,
      .divider::after {
        content: "";
        flex: 1;
        border-bottom: 1px solid #e9ecef;
      }

      .divider span {
        padding: 0 10px;
        font-size: 0.9rem;
      }

      .login-footer {
        text-align: center;
        margin-top: 25px;
      }

      .login-footer a {
        color: var(--primary-medium);
        text-decoration: none;
        font-weight: 600;
        transition: color 0.3s;
      }

      .login-footer a:hover {
        color: var(--primary-dark);
        text-decoration: underline;
      }

      .links-row {
        display: flex;
        justify-content: space-between;
        margin-top: 15px;
        font-size: 0.9rem;
      }

      .remember-me {
        display: flex;
        align-items: center;
        gap: 5px;
        color: #6c757d;
      }

      .remember-me input {
        width: 18px;
        height: 18px;
        accent-color: var(--primary-medium);
      }

      .forgot-password {
        color: var(--primary-medium);
        text-decoration: none;
      }

      .forgot-password:hover {
        color: var(--primary-dark);
        text-decoration: underline;
      }

      .alert-message {
        display: none;
        border-radius: 12px;
        padding: 12px;
        margin-bottom: 20px;
        font-size: 0.9rem;
      }

      .alert-success {
        background-color: #d4edda;
        color: #155724;
        border: 1px solid #c3e6cb;
      }

      .alert-danger {
        background-color: #f8d7da;
        color: #721c24;
        border: 1px solid #f5c6cb;
      }

      /* Loading spinner */
      .spinner {
        display: none;
        width: 20px;
        height: 20px;
        border: 3px solid #ffffff;
        border-top: 3px solid transparent;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin-right: 10px;
      }

      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div class="login-container">
      <div class="login-card">
        <div class="login-header">
          <h2><i class="bi bi-collection"></i> Coleciona+</h2>
          <p>Faça login para gerir as suas coleções</p>
        </div>

        <!-- Mensagem de alerta (demo) -->
        <div id="alertMessage" class="alert-message"></div>

        <!-- Formulário de Login -->
        <form id="loginForm" action="/public/admin/validateLoginSimple" method="post">
          <div class="form-floating">
            <input type="email" class="form-control" id="email" name="user" placeholder="nome@exemplo.com" required />
            <label><i class="bi bi-envelope me-2"></i>Email</label>
          </div>

          <div class="form-floating">
            <input type="password" class="form-control" id="password" name="passw" placeholder="Password" required />
            <label><i class="bi bi-lock me-2"></i>Password</label>
          </div>

          <div class="links-row">
            <label class="remember-me"> <input type="checkbox" checked /> Lembrar-me </label>
            <a href="/public/recuperar-password" class="forgot-password">Esqueceu a password?</a>
          </div>

          <button type="submit" class="btn-login" id="btnLogin">
            <span class="spinner" id="loginSpinner"></span>
            <span>Entrar</span>
          </button>
        </form>

        <div class="divider">
          <span>ou</span>
        </div>

        <!-- Login com Google -->
        <button class="btn-google" id="googleLogin">
          <img src="https://www.google.com/favicon.ico" alt="Google" />
          Continuar com Google
        </button>

        <div class="login-footer">
          <p>Não tem uma conta? <a href="/public/criar-conta">Criar nova conta</a></p>
        </div>
      </div>
    </div>

    <script>
      // Login com Google (demo)
      document.getElementById("googleLogin").addEventListener("click", function () {
        const alertDiv = document.getElementById("alertMessage");
        alertDiv.className = "alert-message alert-success";
        alertDiv.innerHTML = '<i class="bi bi-google me-2"></i>A redirecionar para autenticação Google...';
        alertDiv.style.display = "block";

        setTimeout(function () {
          window.location.href = "dashboard.html";
        }, 1500);
      });
    </script>
  </body>
</html>
